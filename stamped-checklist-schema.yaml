id: https://github.com/stamped-principles/stamped-checklist-schema
name: stamped-checklist
title: STAMPED Checklist Schema
description: >-
  LinkML schema modeling a tiered (MUST/SHOULD/MAY) checklist of verification
  items grouped under STAMPED principles. References principles defined in
  the separately versioned `stamped-principles` schema.
license: CC-BY-4.0
version: 0.1.0

prefixes:
  linkml: https://w3id.org/linkml/
  schema: https://schema.org/
  stamped: https://raw.githubusercontent.com/stamped-principles/stamped-principles-schema/main/
  stamped-checklist: https://github.com/stamped-principles/stamped-checklist-schema

imports:
  - linkml:types
  - stamped:stamped-principles-schema

classes:
  Checklist:
    description: Top-level container for the full reproducibility checklist.
    tree_root: true
    class_uri: schema:ItemList
    attributes:
      version:
        description: Version string for this checklist (e.g., "2.0.0").
        slot_uri: schema:version
        range: string
        required: true
        pattern: "^\\d+\\.\\d+\\.\\d+$"
      principles_version:
        description: >-
          Version of the `stamped-principles` schema whose principle codes
          are referenced by this checklist. Consumers SHOULD verify that the
          imported principles schema matches this version.
        range: string
        required: true
        pattern: "^\\d+\\.\\d+\\.\\d+$"
      data:
        description: Ordered list of requirement-level groupings.
        slot_uri: schema:itemListElement
        range: LevelGroup
        multivalued: true
        inlined_as_list: true
        required: true
        minimum_cardinality: 1

  LevelGroup:
    description: A group of checklist entries sharing the same requirement level.
    class_uri: schema:ItemList
    attributes:
      level:
        description: The requirement level shared by entries in this group.
        range: RequirementLevel
        required: true
      entries:
        description: Checklist entries belonging to this level.
        slot_uri: schema:itemListElement
        range: ChecklistEntry
        multivalued: true
        inlined_as_list: true
        required: true
        minimum_cardinality: 1

  ChecklistEntry:
    description: >-
      A set of verification items associated with one or more STAMPED
      principles. Entries addressing multiple principles jointly list each
      principle's code in `principle_codes`.
    class_uri: stamped-checklist:ChecklistEntry
    attributes:
      principle_codes:
        description: >-
          Codes of the STAMPED principles this entry verifies.
          References `Principle.code` in the stamped-principles schema
          (version pinned via Checklist.principles_version).
        range: Principle
        multivalued: true
        inlined: false
        required: true
        minimum_cardinality: 1
        pattern: "^[A-Z]\\.[1-9][0-9]*$"
      items:
        description: >-
          Verification items used to evaluate conformance with the
          referenced principle(s).
        slot_uri: schema:itemListElement
        range: ChecklistItem
        multivalued: true
        inlined_as_list: true
        required: true
        minimum_cardinality: 1

  ChecklistItem:
    description: >-
      A single verification item belonging to a ChecklistEntry. Each item
      has a stable identifier so that conformance reports and tooling can
      reference it unambiguously across checklist versions.
    class_uri: stamped-checklist:ChecklistItem
    attributes:
      id:
        description: >-
          Stable identifier for this checklist item, unique within the
          checklist. Convention: `stamped-checklist:<LEVEL>/<ORDINAL>` where
          `<LEVEL>` is one of `must`, `should`, or `may` (matching the
          enclosing `LevelGroup.level`) and `<ORDINAL>` is a zero-padded
          3-digit positive integer assigned in document order within the
          level group, starting at `001`. Ordinals MUST NOT be reused: if
          an item is removed, its ordinal is retired; new items receive
          the next unused ordinal.
        range: uriorcurie
        identifier: true
        required: true
        pattern: "^stamped-checklist:(must|should|may)/[0-9]{3}$"
      text:
        description: >-
          Verification question or statement, formatted as
          [CommonMark](https://commonmark.org/) Markdown. Consumers SHOULD
          render accordingly, or display as plain text if rendering is
          unavailable.
        slot_uri: schema:text
        range: string
        required: true
        multivalued: false
